name: waiting-ticket-followup

on:
  schedule:
    - cron: '0 14 * * 1,4'   # Monday and Thursday at 9am CST (14:00 UTC)
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  stale-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run waiting ticket report
        env:
          CONFLUENCE_EMAIL: ${{ secrets.CONFLUENCE_EMAIL }}
          WWEEKS_CONFLUENCE_API_TOKEN: ${{ secrets.WWEEKS_CONFLUENCE_API_TOKEN }}
        run: |
          python3 scripts/waiting_followup.py --report --stale-days 7

      - name: Post summary to workflow output
        if: always()
        run: |
          echo "## Waiting Ticket Follow-up" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Ran at $(date -u +'%Y-%m-%d %H:%M UTC')" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Check the job log above for the full stale ticket report." >> $GITHUB_STEP_SUMMARY

      - name: 📋 Troubleshooting hints (on failure)
        if: failure()
        run: |
          echo "❌ Jira workflow step failed."
          echo ""
          echo "   Likely causes:"
          echo "     • WWEEKS_CONFLUENCE_API_TOKEN secret missing or expired"
          echo "     • CONFLUENCE_EMAIL env does not match the token owner"
          echo "     • Jira issue key in payload is wrong or you lack Browse permission"
          echo "     • Jira API outage or rate limit (10 req/s per user)"
          echo ""
          echo "   Try:"
          echo "     • gh secret list --repo ${{ github.repository }} | grep -i confluence"
          echo "     • Rotate token: https://id.atlassian.com/manage-profile/security/api-tokens"
          echo "     • Replay locally: cd /home/wweeks/git/projects && python3 scripts/<the_failed_script>.py ..."
          echo "     • Jira status: https://status.atlassian.com/"
