name: preflight

on:
  pull_request:
    branches:
      - dev
      - main
      - "release/**"

permissions:
  contents: read

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Run preflight gate (C#)
        run: dotnet run --project scripts/Ace.Quality.Gates/Ace.Quality.Gates.csproj -- preflight
