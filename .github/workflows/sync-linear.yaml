name: Sync Linear Issues

on:
  push:
    branches: [main]
    paths: ["issues/**"]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Sync issues/*.md to Linear
        env:
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
        run: python3 scripts/linear_sync.py
