name: SDP Debug Dump

on:
  workflow_dispatch:
    inputs:
      sdp_id:
        description: "SDP id"
        required: true

jobs:
  debug:
    runs-on: ubuntu-latest
    env:
      WWEEKS_SDP: ${{ secrets.WWEEKS_SDP }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install requests pyyaml

      - name: Dump full request + tasks
        run: |
          python3 - << 'PY'
          import json
          import sys
          import urllib.parse
          sys.path.insert(0, 'scripts')
          from sdp_lib import (
              load_env_file, get_sdp_token, resolve_long_id, sdp_get,
          )
          load_env_file()
          token = get_sdp_token()
          long_id = resolve_long_id("${{ inputs.sdp_id }}", token)
          print("LONG_ID:", long_id)
          print()
          req = sdp_get(f"/api/v3/requests/{long_id}", token).get("request", {})
          print("=== FIELDS ===")
          for k in ("status","priority","urgency","group","technician","resolution","mode","level","request_type"):
              if k in req:
                  print(f"  {k}: {json.dumps(req[k])[:300]}")
          print()
          print("=== TASKS ===")
          try:
              t_resp = sdp_get(f"/api/v3/requests/{long_id}/tasks", token)
              tasks = t_resp.get("tasks", [])
              print(f"  count={len(tasks)}")
              for t in tasks:
                  st = (t.get('status') or {}).get('name')
                  print(f"  task {t.get('id')}: status={st!r} title={t.get('title')!r}")
          except Exception as e:
              print(f"  ERROR: {e}")
          print()
          print("=== RECENT OPEN REQUESTS (mine groups/priority/urgency) ===")
          try:
              q = urllib.parse.quote(json.dumps({
                  "list_info": {
                      "row_count": 10,
                      "sort_field": "created_time",
                      "sort_order": "desc",
                      "search_criteria": [
                          {"field": "status.name", "condition": "is", "value": "Open"}
                      ],
                  }
              }))
              r_resp = sdp_get(f"/api/v3/requests?input_data={q}", token)
              seen_groups = set()
              seen_pris = set()
              seen_urgs = set()
              for r in r_resp.get("requests", []):
                  g = r.get("group") or {}
                  if g and not g.get("deleted") and g.get("id") not in seen_groups:
                      seen_groups.add(g.get("id"))
                      print(f"  GROUP id={g.get('id')} name={g.get('name')!r} site={(g.get('site') or {}).get('name')!r}")
                  p = r.get("priority") or {}
                  if p and p.get("id") not in seen_pris:
                      seen_pris.add(p.get("id"))
                      print(f"  PRIORITY id={p.get('id')} name={p.get('name')!r}")
                  u = r.get("urgency") or {}
                  if u and u.get("id") not in seen_urgs:
                      seen_urgs.add(u.get("id"))
                      print(f"  URGENCY id={u.get('id')} name={u.get('name')!r}")
          except Exception as e:
              print(f"  ERROR: {e}")
          PY

      - name: 📋 Troubleshooting hints (on failure)
        if: failure()
        run: |
          echo "❌ SDP workflow step failed."
          echo ""
          echo "   Likely causes:"
          echo "     • WWEEKS_SDP secret missing or not valid base64 JSON"
          echo "     • Zoho OAuth refresh token expired (refresh tokens last ~1 year)"
          echo "     • SDP request ID does not exist (deleted, or short vs long ID confusion)"
          echo "     • SDP API rate limit or Zoho outage"
          echo ""
          echo "   Try:"
          echo "     • Validate secret: echo \"\$WWEEKS_SDP_B64\" | base64 -d | python3 -m json.tool"
          echo "     • Re-issue Zoho refresh token: https://api-console.zoho.com/"
          echo "     • Replay locally: cd /home/wweeks/git/projects && python3 scripts/sdp_fetch_ticket.py --id <ID>"
          echo "     • Verify in browser: https://<YOUR_SDP>.sdpondemand.manageengine.com/app/itdesk/ui/requests/<ID>"
          echo "     • Zoho status: https://status.zoho.com/"
