name: SDP Smoke Test

on:
  workflow_dispatch:
    inputs:
      sdp_id:
        description: "SDP id (display or long)"
        required: true
        default: "110247000036547022"
      set_done:
        description: "Transition to Resolved at end"
        type: boolean
        default: false
      close_after:
        description: "Transition to Closed at end (overrides set_done if both set)"
        type: boolean
        default: false

      resolution:
        description: "Resolution text (used when transitioning to Resolved/Closed)"
        required: false
        default: ""

jobs:
  smoke:
    runs-on: ubuntu-latest
    env:
      WWEEKS_SDP: ${{ secrets.WWEEKS_SDP }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install requests pyyaml

      - name: 1. Fetch request (verify auth + resolve_long_id)
        run: python3 scripts/sdp_fetch_ticket.py --long-id ${{ inputs.sdp_id }}

      - name: 2. Context bundle (brief mode)
        run: python3 scripts/sdp_context_bundle.py --id ${{ inputs.sdp_id }} --mode brief

      - name: 3. Changelog (verify history endpoint)
        run: python3 scripts/sdp_changelog.py --id ${{ inputs.sdp_id }}

      - name: 4. Search by tag (verify list_requests + filter)
        run: python3 scripts/sdp_search.py --tag flow:queue --limit 5 || echo "no results is OK"

      - name: 5. Sync waiting overview
        run: python3 scripts/sdp_sync_waiting.py || echo "empty is OK"

      - name: 6. Dry-run set_flow done+transition
        run: python3 scripts/sdp_set_flow.py --id ${{ inputs.sdp_id }} --flow done --transition --dry-run --json

      - name: 7. ACTUAL set_flow done (if requested)
        if: ${{ inputs.set_done && !inputs.close_after }}
        run: python3 scripts/sdp_set_flow.py --id ${{ inputs.sdp_id }} --flow done --transition --json

      - name: 8. ACTUAL set_flow done + transition to Closed (if requested)
        if: ${{ inputs.close_after }}
        env:
          RESOLUTION: ${{ inputs.resolution }}
        run: |
          if [ -n "$RESOLUTION" ]; then
            python3 scripts/sdp_set_flow.py --id ${{ inputs.sdp_id }} --flow done --transition --status Closed --resolution "$RESOLUTION" --json
          else
            python3 scripts/sdp_set_flow.py --id ${{ inputs.sdp_id }} --flow done --transition --status Closed --json
          fi

      - name: 📋 Troubleshooting hints (on failure)
        if: failure()
        run: |
          echo "❌ SDP workflow step failed."
          echo ""
          echo "   Likely causes:"
          echo "     • WWEEKS_SDP secret missing or not valid base64 JSON"
          echo "     • Zoho OAuth refresh token expired (refresh tokens last ~1 year)"
          echo "     • SDP request ID does not exist (deleted, or short vs long ID confusion)"
          echo "     • SDP API rate limit or Zoho outage"
          echo ""
          echo "   Try:"
          echo "     • Validate secret: echo \"\$WWEEKS_SDP_B64\" | base64 -d | python3 -m json.tool"
          echo "     • Re-issue Zoho refresh token: https://api-console.zoho.com/"
          echo "     • Replay locally: cd /home/wweeks/git/projects && python3 scripts/sdp_fetch_ticket.py --id <ID>"
          echo "     • Verify in browser: https://<YOUR_SDP>.sdpondemand.manageengine.com/app/itdesk/ui/requests/<ID>"
          echo "     • Zoho status: https://status.zoho.com/"
