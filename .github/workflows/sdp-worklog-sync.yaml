name: SDP worklog sync

on:
  push:
    branches: [main]
    paths:
      - "cases/**"

permissions:
  contents: read

jobs:
  sync-sdp-worklog:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync worklogs/comments to SDP
        run: |
          export WWEEKS_SDP=$(echo "$WWEEKS_SDP_B64" | base64 -d)
          python3 scripts/sync_sdp_worklog.py \
            --from "${{ github.event.before }}" \
            --to "${{ github.sha }}"
        env:
          WWEEKS_SDP_B64: ${{ secrets.WWEEKS_SDP }}

      - name: Reconcile SDP fields (tags / tasks / links / approvals) from markdown
        run: |
          export WWEEKS_SDP=$(echo "$WWEEKS_SDP_B64" | base64 -d)
          python3 scripts/sync_sdp_fields.py \
            --changed-since "${{ github.event.before }}" || \
            echo "::warning::sync_sdp_fields.py reported errors (non-fatal)"
        env:
          WWEEKS_SDP_B64: ${{ secrets.WWEEKS_SDP }}

      - name: 📋 Troubleshooting hints (on failure)
        if: failure()
        run: |
          echo "❌ SDP worklog sync failed."
          echo ""
          echo "   Likely causes:"
          echo "     • WWEEKS_SDP secret missing or no longer valid base64 JSON"
          echo "     • Zoho OAuth refresh token expired (refresh tokens last ~1 year)"
          echo "     • Case file has malformed Actions section or bad markdown"
          echo "     • SDP On-Demand API outage or rate limit"
          echo ""
          echo "   Try:"
          echo "     • Validate secret format: echo \"\$WWEEKS_SDP_B64\" | base64 -d | python3 -m json.tool"
          echo "     • Re-issue Zoho refresh token: https://api-console.zoho.com/"
          echo "     • Update secret: gh secret set WWEEKS_SDP --body \"<new base64 JSON>\""
          echo "     • Replay locally: python3 scripts/sync_sdp_worklog.py --from <sha> --to <sha>"
          echo "     • SDP status: https://status.zoho.com/"
