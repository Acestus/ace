name: Monthly Azure Retirement Review

on:
  schedule:
    # 8:00 AM CDT (13:00 UTC) on the 1st of every month
    - cron: "0 13 1 * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (print ticket, don't create)"
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  create-retirement-review-ticket:
    runs-on: ubuntu-latest
    env:
      CONFLUENCE_EMAIL: "wweeks@<ORG_PARENT_DOMAIN>"
      WWEEKS_CONFLUENCE_API_TOKEN: ${{ secrets.WWEEKS_CONFLUENCE_API_TOKEN || secrets.JIRA_API_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create monthly retirement review ticket
        env:
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
        run: |
          MONTH=$(date +"%B %Y")
          SUMMARY="Azure - Monthly Service Retirement Review - ${MONTH}"

          DESCRIPTION="Monthly review of Azure Advisor retirement recommendations across all <ORG_NAME> subscriptions.

          Run the following Resource Graph query and compare against last month's findings. Create child tickets for any new retirement notices that affect <ORG_NAME> workloads.

          \`\`\`bash
          az graph query -q \"
          advisorresources
          | where type == 'microsoft.advisor/recommendations'
          | project
              subscriptionId,
              problem=tostring(properties['shortDescription']['problem']),
              solution=tostring(properties['shortDescription']['solution']),
              impact=tostring(properties['impact']),
              resourceId=tostring(properties['resourceMetadata']['resourceId'])
          | where problem contains 'etir'
              or problem contains 'eprecate'
              or problem contains 'end of life'
              or problem contains 'Classic '
              or solution contains 'decommission'
          | summarize resources=make_set(resourceId), count=count() by problem, solution, impact
          | order by impact asc
          \" -o table
          \`\`\`

          Workbook: https://portal.azure.com/#view/AppInsightsExtension/UsageNotebookBlade/ComponentId/Azure%20Advisor/ConfigurationId/community-Workbooks%2FAzure%20Advisor%2FAzureServiceRetirement/Type/workbook/WorkbookTemplateName/Service%20Retirement%20(Preview)

          Prior review: <PROJECT>-406 (2026-05-29) — Key Vault API (<PROJECT>-519), NVA tags (<PROJECT>-520), AVD/DSC/DCsv2 (<PROJECT>-521)"

          if [ "$DRY_RUN" = "true" ]; then
            echo "DRY RUN — would create:"
            echo "  Summary: $SUMMARY"
            echo "  Labels: flow:queue, urgency:4, importance:3, agentic:3, way:azure"
            exit 0
          fi

          python3 scripts/jira_create_issue.py \
            --summary "$SUMMARY" \
            --description "$DESCRIPTION" \
            --epic "<PROJECT>-472" \
            --label "flow:queue" \
            --label "urgency:4" \
            --label "importance:3" \
            --label "agentic:3" \
            --label "way:azure"

      - name: 📋 Troubleshooting hints (on failure)
        if: failure()
        run: |
          echo "❌ Jira workflow step failed."
          echo ""
          echo "   Likely causes:"
          echo "     • WWEEKS_CONFLUENCE_API_TOKEN secret missing or expired"
          echo "     • CONFLUENCE_EMAIL env does not match the token owner"
          echo "     • Jira issue key in payload is wrong or you lack Browse permission"
          echo "     • Jira API outage or rate limit (10 req/s per user)"
          echo ""
          echo "   Try:"
          echo "     • gh secret list --repo ${{ github.repository }} | grep -i confluence"
          echo "     • Rotate token: https://id.atlassian.com/manage-profile/security/api-tokens"
          echo "     • Replay locally: cd /home/wweeks/git/projects && python3 scripts/<the_failed_script>.py ..."
          echo "     • Jira status: https://status.atlassian.com/"
