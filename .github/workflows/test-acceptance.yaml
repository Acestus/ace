name: test-acceptance

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment for acceptance test execution"
        required: true
        type: choice
        options:
          - dev
          - stg
          - prd

permissions:
  id-token: write
  contents: read

jobs:
  acceptance-tests:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Run outer-loop acceptance score tests
        run: >
          dotnet test tests/Quality.Reqnroll.Score.Tests/Quality.Reqnroll.Score.Tests.csproj
          --filter "TestCategory=outer-loop-gherkin-score|Category=outer-loop-gherkin-score"

      - name: Upload acceptance score reports
        uses: actions/upload-artifact@v4
        with:
          name: acceptance-score-${{ inputs.environment }}
          path: docs/testing/outer-loop-gherkin-score.*
          if-no-files-found: error
