name: SDP approval poll

on:
  schedule:
    # 4 times a day: 06:00, 11:00, 15:00, 20:00 America/Chicago (≈ 11/16/20/01 UTC)
    - cron: "0 11,16,20,1 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  poll-sdp-approvals:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Poll pending approvals
        env:
          WWEEKS_SDP_B64: ${{ secrets.WWEEKS_SDP }}
        run: |
          export WWEEKS_SDP=$(echo "$WWEEKS_SDP_B64" | base64 -d)
          # For every case tagged flow:waiting, pull the latest approval state
          # and surface a per-case status line to the workflow log. The actual
          # markdown update happens through sdp-worklog (<YOUR_NAME> reviews and
          # commits) — this is intentionally read-only on disk to avoid bot
          # writes racing with manual edits.
          python3 scripts/sdp_sync_waiting.py --json > /tmp/waiting.json
          python3 - <<'PY'
          import json
          from pathlib import Path
          waiting = json.loads(Path("/tmp/waiting.json").read_text())
          if not waiting:
              print("No flow:waiting cases.")
              raise SystemExit(0)
          for w in waiting:
              print(f"SDP-{w['display_id']}  approval={w['approval_status']!r:>14}  "
                    f"stale={w['stale_days']}d  {w['subject'][:60]}")
          PY

      - name: Summarize approvals into job summary
        if: always()
        run: |
          if [ -s /tmp/waiting.json ]; then
            echo "### Pending SDP approvals" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "| SDP | Approval | Stale | Subject |" >> "$GITHUB_STEP_SUMMARY"
            echo "|-----|----------|-------|---------|" >> "$GITHUB_STEP_SUMMARY"
            python3 - <<'PY' >> "$GITHUB_STEP_SUMMARY"
          import json
          from pathlib import Path
          for w in json.loads(Path("/tmp/waiting.json").read_text()):
              print(f"| SDP-{w['display_id']} | {w['approval_status']} | {w['stale_days']}d | {w['subject'][:80]} |")
          PY
          fi

      - name: 📋 Troubleshooting hints (on failure)
        if: failure()
        run: |
          echo "❌ SDP workflow step failed."
          echo ""
          echo "   Likely causes:"
          echo "     • WWEEKS_SDP secret missing or not valid base64 JSON"
          echo "     • Zoho OAuth refresh token expired (refresh tokens last ~1 year)"
          echo "     • SDP request ID does not exist (deleted, or short vs long ID confusion)"
          echo "     • SDP API rate limit or Zoho outage"
          echo ""
          echo "   Try:"
          echo "     • Validate secret: echo \"\$WWEEKS_SDP_B64\" | base64 -d | python3 -m json.tool"
          echo "     • Re-issue Zoho refresh token: https://api-console.zoho.com/"
          echo "     • Replay locally: cd /home/wweeks/git/projects && python3 scripts/sdp_fetch_ticket.py --id <ID>"
          echo "     • Verify in browser: https://<YOUR_SDP>.sdpondemand.manageengine.com/app/itdesk/ui/requests/<ID>"
          echo "     • Zoho status: https://status.zoho.com/"
