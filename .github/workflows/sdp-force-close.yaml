name: SDP Force Close

on:
  workflow_dispatch:
    inputs:
      sdp_id:
        description: "SDP id (display or long)"
        required: true
      resolution:
        description: "Resolution text"
        required: true
      dry_run:
        description: "Print PUT body without sending"
        type: boolean
        default: false

jobs:
  force-close:
    runs-on: ubuntu-latest
    env:
      WWEEKS_SDP: ${{ secrets.WWEEKS_SDP }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install requests pyyaml

      - name: Force-close with full field fix-up
        env:
          SDP_ID: ${{ inputs.sdp_id }}
          RESOLUTION: ${{ inputs.resolution }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          python3 - << 'PY'
          """
          Single-token, one-shot SDP close.

          The <ORG_NAME> SDP On-Demand instance has tickets where the assigned
          'group' has been deleted and priority/urgency are unset. SDP
          On-Demand validates these fields on close and silently reverts
          the status if any are invalid (PUT returns 200 OK but the change
          doesn't persist).

          This script:
            1. Fetches the target request
            2. Scans recent Open requests to find an active group, a real
               priority, and a real urgency (since /api/v3/groups itself
               requires SDPOnDemand.setup.READ scope our OAuth doesn't have)
            3. Issues ONE PUT that fixes group/priority/urgency AND closes
               the ticket in the same payload
          """
          import json, os, sys, urllib.parse
          sys.path.insert(0, 'scripts')
          from sdp_lib import (
              load_env_file, get_sdp_token, resolve_long_id,
              sdp_get, sdp_put,
          )
          load_env_file()
          token = get_sdp_token()
          long_id = resolve_long_id(os.environ["SDP_ID"], token)
          resolution = os.environ["RESOLUTION"]
          dry_run = os.environ.get("DRY_RUN", "").lower() == "true"

          # ---- 1. Current state -------------------------------------------------
          req = sdp_get(f"/api/v3/requests/{long_id}", token).get("request", {})
          cur_group = req.get("group") or {}
          cur_pri = req.get("priority") or {}
          cur_urg = req.get("urgency") or {}
          cur_site = req.get("site") or {}
          cur_tech = req.get("technician") or {}
          print(f"BEFORE: status={(req.get('status') or {}).get('name')!r}"
                f" site={cur_site.get('name')!r}"
                f" group={cur_group.get('name')!r}(deleted={cur_group.get('deleted')})"
                f" tech={cur_tech.get('name')!r}"
                f" priority={cur_pri.get('name')!r} urgency={cur_urg.get('name')!r}")

          # ---- 2. Discover active group/priority/urgency from siblings ---------
          active_group = None
          active_pri = None
          active_urg = None

          # Scan siblings on the SAME SITE for a valid group
          site_id_target = cur_site.get("id")
          q = urllib.parse.quote(json.dumps({
              "list_info": {
                  "row_count": 100,
                  "sort_field": "created_time",
                  "sort_order": "desc",
                  "search_criteria": [
                      {"field": "status.name", "condition": "is", "value": "Open"}
                  ],
              }
          }))
          try:
              siblings = sdp_get(f"/api/v3/requests?input_data={q}", token).get("requests", [])
              for r in siblings:
                  r_site = (r.get("site") or {}).get("id")
                  same_site = (site_id_target is None and r_site is None) or (r_site == site_id_target)
                  g = r.get("group") or {}
                  if same_site and g and not g.get("deleted") and not active_group:
                      active_group = {"id": g["id"], "name": g.get("name")}
                  p = r.get("priority") or {}
                  if p and p.get("id") and not active_pri:
                      active_pri = {"id": p["id"], "name": p.get("name")}
                  u = r.get("urgency") or {}
                  if u and u.get("id") and not active_urg:
                      active_urg = {"id": u["id"], "name": u.get("name")}
                  if active_group and active_pri and active_urg:
                      break
          except Exception as e:
              print(f"  WARN sibling scan failed: {e}", file=sys.stderr)

          # Fall back to current values if they're still valid
          if not active_group and cur_group and not cur_group.get("deleted"):
              active_group = {"id": cur_group["id"], "name": cur_group.get("name")}
          if not active_pri and cur_pri and cur_pri.get("id"):
              active_pri = {"id": cur_pri["id"], "name": cur_pri.get("name")}
          if not active_urg and cur_urg and cur_urg.get("id"):
              active_urg = {"id": cur_urg["id"], "name": cur_urg.get("name")}

          print(f"WILL SET: group={active_group} priority={active_pri} urgency={active_urg}")

          # ---- 3. Build close payload ------------------------------------------
          body = {
              "status": {"name": "Closed"},
              "resolution": {"content": resolution},
              "closure_info": {
                  "requester_ack_resolution": True,
                  "requester_ack_comments": "Closed via API.",
                  "closure_comments": (resolution[:247] + "...") if len(resolution) > 250 else resolution,
                  "closure_code": {"name": "Success"},
              },
          }
          if active_pri:
              body["priority"] = active_pri
          if active_urg:
              body["urgency"] = active_urg

          # Try several group strategies in order; "Site/Group/Technician
          # validation failed" means the combo is invalid. Clearing fields
          # one at a time tells us which one SDP is rejecting.
          strategies = []
          if active_group:
              strategies.append(("same-site-group", {**body, "group": active_group}))
          # Clear group (and tech) — may still pass if SDP allows null
          strategies.append(("clear-group-and-tech",
                             {**body, "group": None, "technician": None}))
          strategies.append(("clear-group-only", {**body, "group": None}))
          # No change to group/tech at all (server keeps the deleted group;
          # some SDP instances tolerate this on close)
          strategies.append(("no-group-change", body))

          if dry_run:
              for name, p in strategies:
                  print(f"\n--- DRY RUN strategy={name} ---")
                  print(json.dumps({"request": p}, indent=2))
              sys.exit(0)

          last_err = None
          succeeded = False
          for name, p in strategies:
              payload = {"request": p}
              print(f"\n--- Trying strategy: {name} ---")
              try:
                  resp = sdp_put(f"/api/v3/requests/{long_id}", token, payload)
                  rs = resp.get("response_status") or {}
                  status = rs.get("status")
                  msgs = rs.get("messages") or []
                  print(f"  response_status.status={status}")
                  for m in msgs:
                      print(f"    msg: {m}")
                  # Verify via re-fetch (warning may still have applied the close)
                  chk = sdp_get(f"/api/v3/requests/{long_id}", token).get("request", {})
                  chk_status = (chk.get("status") or {}).get("name")
                  print(f"  re-fetch status={chk_status!r}")
                  if chk_status == "Closed":
                      print(f"  ✓ CLOSE CONFIRMED with strategy={name}")
                      succeeded = True
                      break
              except Exception as e:
                  last_err = e
                  print(f"  ✗ strategy {name} HTTP error: {str(e)[:200]}")
                  continue

          if not succeeded:
              print(f"\n⚠ NO STRATEGY ACHIEVED CLOSE. Last err: {last_err}", file=sys.stderr)
              sys.exit(2)

          # ---- 5. (verify block now inline above) ----
          PY

      - name: 📋 Troubleshooting hints (on failure)
        if: failure()
        run: |
          echo "❌ SDP workflow step failed."
          echo ""
          echo "   Likely causes:"
          echo "     • WWEEKS_SDP secret missing or not valid base64 JSON"
          echo "     • Zoho OAuth refresh token expired (refresh tokens last ~1 year)"
          echo "     • SDP request ID does not exist (deleted, or short vs long ID confusion)"
          echo "     • SDP API rate limit or Zoho outage"
          echo ""
          echo "   Try:"
          echo "     • Validate secret: echo \"\$WWEEKS_SDP_B64\" | base64 -d | python3 -m json.tool"
          echo "     • Re-issue Zoho refresh token: https://api-console.zoho.com/"
          echo "     • Replay locally: cd /home/wweeks/git/projects && python3 scripts/sdp_fetch_ticket.py --id <ID>"
          echo "     • Verify in browser: https://<YOUR_SDP>.sdpondemand.manageengine.com/app/itdesk/ui/requests/<ID>"
          echo "     • Zoho status: https://status.zoho.com/"
