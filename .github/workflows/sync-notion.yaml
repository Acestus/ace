name: Sync Notion Pages

on:
  push:
    branches: [main]
    paths: ["notion/**"]

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Sync notion/*.md to Notion
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_ROOT_PAGE_ID: ${{ secrets.NOTION_ROOT_PAGE_ID }}
        run: python3 scripts/notion_sync.py

      - name: Commit updated notion_ids
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet && echo "No changes to commit" && exit 0
          git add notion/
          git commit -m "chore: write notion_ids after page creation [skip ci]"
          git push
